name: Android debug APK

# Builds the Capacitor Android debug APK in CI so it does not depend on any
# single workstation's toolchain. Capacitor 8 requires JDK 21 (the generated
# Gradle files pin JavaVersion.VERSION_21) — JDK 17 fails at
# :capacitor-android:compileDebugJavaWithJavac with "invalid source release: 21".
#
# Build-only: no Thai card content, app logic, Supabase schema, payments, ads,
# subscriptions, or secrets are involved. Frontend env values are public; provide
# them as repo VARIABLES (Settings → Secrets and variables → Actions → Variables)
# so the web build embeds them, or the build still succeeds with empty values.

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-debug.yml'

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install npm dependencies
        run: npm ci

      - name: Web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ vars.VITE_SUPABASE_KEY }}
          VITE_ONESIGNAL_APP_ID: ${{ vars.VITE_ONESIGNAL_APP_ID }}
        run: npm run build

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
